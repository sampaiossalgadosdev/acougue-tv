<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AçougueTV Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #f0f0f0;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon { font-size: 44px; display: block; margin-bottom: 10px; }

    .logo-title {
      font-size: 22px;
      font-weight: 700;
      color: #f0c040;
    }

    .logo-sub { font-size: 13px; color: #555; margin-top: 4px; }

    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }

    .campo { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #bbb;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: #252525;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 13px 16px;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #f0c040; }
    input::placeholder { color: #555; }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: #f0c040;
      color: #111;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: #f5d060; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #555; color: #888; cursor: not-allowed; }

    .erro {
      margin-top: 14px;
      padding: 12px 14px;
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.4);
      border-radius: 8px;
      color: #ff6b6b;
      font-size: 13px;
      display: none;
    }

    .link-cadastro {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #555;
    }

    .link-cadastro a { color: #f0c040; text-decoration: none; }
    .link-cadastro a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <span class="logo-icon">🥩</span>
      <div class="logo-title">AçougueTV</div>
      <div class="logo-sub">Painel Administrativo</div>
    </div>

    <h1>Entrar na conta</h1>

    <div class="campo">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
    </div>

    <div class="campo">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="btn-login" onclick="login()">Entrar</button>

    <div class="erro" id="erro-msg"></div>

    <p class="link-cadastro">
      Ainda não tem conta? <a href="/empresas/cadastro.html">Cadastrar empresa</a>
    </p>
  </div>

  <script>
    const ADMIN_TOKEN_KEY = 'admin_token';

    if (localStorage.getItem(ADMIN_TOKEN_KEY)) {
      window.location.href = '/admin/dashboard.html';
    }

    document.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    });

    async function login() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btn-login');
      const erroEl = document.getElementById('erro-msg');

      erroEl.style.display = 'none';

      if (!email || !senha) {
        erroEl.textContent = 'Preencha e-mail e senha.';
        erroEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch('/api/auth/empresa/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          erroEl.textContent = data.error || 'Credenciais inválidas.';
          erroEl.style.display = 'block';
          return;
        }

        localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
        localStorage.setItem('empresa_nome', data.empresa.nome);
        localStorage.setItem('tv_token_admin', data.empresa.tv_token);
        window.location.href = '/admin/dashboard.html';
      } catch {
        erroEl.textContent = 'Erro de conexão. Tente novamente.';
        erroEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
