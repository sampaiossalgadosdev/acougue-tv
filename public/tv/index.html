<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>AçougueTV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Oswald', sans-serif;
      cursor: none;
    }

    .tv-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ===== ÁREA DA LISTA (esquerda) ===== */
    /* Posicionado sobre o painel escuro esquerdo da imagem */
    .lista-carnes {
      position: absolute;
      left: 10%;
      top: 32%;
      width: 29%;
      height: 44%;
      overflow: hidden;
    }

    .lista-wrapper {
      width: 100%;
      will-change: transform;
      display: flex;
      flex-direction: column;
      gap: 1vh; /* ← altere aqui o espaçamento entre os itens */
    }

    .lista-wrapper.scrolling {
      animation: scrollUp linear infinite;
    }

    @keyframes scrollUp {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .carne-item {
      display: flex;
      align-items: center;
      padding: 0.6vh 0.8vw;
      gap: 0.5vw;
    }

    .carne-icone {
      flex-shrink: 0;
      width: 2.2vh;
      height: 2.2vh;
      opacity: 0.85;
    }

    .carne-nome {
      flex: 1;
      font-family: 'Oswald', sans-serif;
      left: 3%;;
      font-size: 3.5vh;
      font-weight: 600;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .carne-preco-area {
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      gap: 0.15vw;
      white-space: nowrap;
      right: 5vw;
    }

    .carne-rs {
      font-size: 2.5vh;
      color: #dddddd;
      font-weight: 400;
    }

    .carne-valor {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4vh;
      color: #f0c040;
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .carne-kg {
      font-size: 2.5vh;
      color: #dddddd;
      font-weight: 400;
    }

    /* ===== ÁREA DO DESTAQUE (direita) ===== */
    /* Posicionado sobre o painel direito da imagem */
    .destaque-area {
      position: absolute;
      left: 33%;
      top: 22%;
      width: 63%;
      height: 66%;
      max-height: 70%;
    }

    .destaque-foto {
      position: absolute;
      top: 17%;
      left: 18.5%;
      width: 80%;
      height: 80%;
      object-fit: cover;
      border-radius: 1vw;
      object-position: center;
      transition: opacity 0.5s ease;
    }

    /* Overlay com informações no canto superior direito */
    .destaque-info {
      position: absolute;
      top: 6%;
      right: 3%;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5vh;
      z-index: 2;
      transition: opacity 0.5s ease;
    }

    .destaque-nome-badge {
      background: linear-gradient(135deg, #0d2d6e, #1a4aaa);
      border: 2px solid #2a6aee;
      border-radius: 0.5vw;
      padding: 0.5vh 1.2vw;
      text-align: center;
      min-width: 12vw;
    }

    .destaque-nome-texto {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 2.4vh;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .destaque-sub-texto {
      display: block;
      font-family: 'Oswald', sans-serif;
      font-size: 1.6vh;
      font-weight: 400;
      color: #aaccff;
      text-transform: uppercase;
      margin-top: 0.2vh;
    }

    .destaque-preco-badge {
      background: #f0c040;
      border-radius: 0.5vw;
      padding: 0.3vh 1.2vw 0.5vh;
      text-align: center;
      min-width: 12vw;
    }

    .destaque-preco-linha {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 0.2vw;
    }

    .destaque-preco-rs {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8vh;
      font-weight: 700;
      color: #7a0000;
      margin-top: 0.8vh;
      line-height: 1;
    }

    .destaque-preco-valor {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 7vh;
      color: #7a0000;
      line-height: 1;
    }

    .destaque-preco-kg {
      font-family: 'Oswald', sans-serif;
      font-size: 1.6vh;
      font-weight: 700;
      color: #7a0000;
      align-self: flex-end;
      margin-bottom: 0.5vh;
    }

    .destaque-desconto-badge {
      background: #0d2d6e;
      border: 2px solid #f0c040;
      border-radius: 0.4vw;
      padding: 0.2vh 1.2vw;
      text-align: center;
      min-width: 12vw;
    }

    .destaque-desconto-texto {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3vh;
      color: #f0c040;
      letter-spacing: 2px;
    }

    /* Estado vazio */
    .vazio-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      font-size: 2vh;
      text-align: center;
      padding: 1vw;
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <img src="/assets/plano_amaro.png" class="bg-image" alt="" />

    <!-- Lista de carnes -->
    <div class="lista-carnes">
      <div class="lista-wrapper" id="lista-wrapper">
        <div class="vazio-msg" id="lista-vazio" style="display:none">
          Nenhum produto cadastrado
        </div>
      </div>
    </div>

    <!-- Destaque -->
    <div class="destaque-area" id="destaque-area" style="display:none">
      <img class="destaque-foto" id="destaque-foto" src="" alt="" />
      <div class="destaque-info" id="destaque-info">
        <div class="destaque-nome-badge">
          <span class="destaque-nome-texto" id="destaque-nome">-</span>
          <span class="destaque-sub-texto" id="destaque-sub">-</span>
        </div>
        <div class="destaque-preco-badge">
          <div class="destaque-preco-linha">
            <span class="destaque-preco-rs">R$</span>
            <span class="destaque-preco-valor" id="destaque-valor">0,00</span>
            <span class="destaque-preco-kg">KG</span>
          </div>
        </div>
        <div class="destaque-desconto-badge" id="destaque-desconto-badge" style="display:none">
          <span class="destaque-desconto-texto" id="destaque-desconto-texto">-</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TV_TOKEN_KEY = 'tv_token';
    function getIcone(tipo) {
      const t = (tipo || '').toLowerCase();
      const a = 'class="carne-icone" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"';

      if (t.includes('su')) return `<svg ${a}>
        <ellipse cx="14" cy="18" rx="9" ry="7" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <circle cx="24" cy="16" r="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <ellipse cx="27" cy="18" rx="2.5" ry="2" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
        <circle cx="26.2" cy="18" r="0.7" fill="rgba(255,255,255,0.9)"/>
        <circle cx="27.8" cy="18" r="0.7" fill="rgba(255,255,255,0.9)"/>
        <path d="M21 11 L19 7 L23 9 Z" fill="rgba(255,255,255,0.7)" stroke="rgba(255,255,255,0.8)" stroke-width="1" stroke-linejoin="round"/>
        <path d="M5 17 C3 14, 4 10, 6 11 C8 12, 7 15, 5 15" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>`;

      if (t.includes('ave') || t.includes('frango') || t.includes('galinha')) return `<svg ${a}>
        <ellipse cx="13" cy="19" rx="8" ry="6" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <circle cx="23" cy="13" r="4.5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <path d="M27 14 L30 14 L28.5 16 Z" fill="rgba(255,255,255,0.8)"/>
        <circle cx="24" cy="12" r="1.2" fill="rgba(255,255,255,0.9)"/>
        <path d="M8 17 C6 13, 11 10, 14 14" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M21 9 C20 6, 22 6, 22 9" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>`;

      if (t.includes('pesc') || t.includes('peix')) return `<svg ${a}>
        <path d="M6 16 L2 10 L2 22 Z" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linejoin="round"/>
        <ellipse cx="17" cy="16" rx="11" ry="6.5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <circle cx="24" cy="14" r="2" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.8)" stroke-width="1.2"/>
        <circle cx="24.5" cy="14" r="0.8" fill="rgba(255,255,255,0.9)"/>
        <path d="M14 10 C16 7, 19 8, 18 11" stroke="rgba(255,255,255,0.7)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      </svg>`;

      if (t.includes('embutido') || t.includes('processado')) return `<svg ${a}>
        <ellipse cx="7" cy="20" rx="5" ry="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <ellipse cx="16" cy="16" rx="5" ry="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" transform="rotate(-20 16 16)"/>
        <ellipse cx="25" cy="11" rx="5" ry="4" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" transform="rotate(-40 25 11)"/>
        <path d="M11 19 C12.5 18, 13 17, 13 16" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M20 14 C21 13, 21.5 12, 21 11" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>`;

      // Bovina (padrão)
      return `<svg ${a}>
        <path d="M4 8 C4 4, 8 2, 10 5 L10 8" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M28 8 C28 4, 24 2, 22 5 L22 8" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <ellipse cx="16" cy="16" rx="12" ry="10" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>
        <ellipse cx="12" cy="14" rx="1.5" ry="1.5" fill="rgba(255,255,255,0.9)"/>
        <ellipse cx="20" cy="14" rx="1.5" ry="1.5" fill="rgba(255,255,255,0.9)"/>
        <ellipse cx="16" cy="20" rx="4" ry="2.5" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
      </svg>`;
    }

    let carnes = [];
    let destaques = [];
    let destaqueIdx = 0;
    let destaqueTimer = null;
    let dadosAnterior = '';

    function formatPreco(v) {
      return parseFloat(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function verificarAuth() {
      const token = localStorage.getItem(TV_TOKEN_KEY);
      if (!token) { window.location.href = '/empresas/login.html'; return null; }
      return token;
    }

    async function fetchCarnes() {
      const token = verificarAuth();
      if (!token) return;

      try {
        const res = await fetch('/api/carnes/tv', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) {
          localStorage.removeItem(TV_TOKEN_KEY);
          window.location.href = '/empresas/login.html';
          return;
        }

        const data = await res.json();
        const hash = JSON.stringify(data);
        if (hash === dadosAnterior) return;
        dadosAnterior = hash;
        carnes = data;
        renderizar();
      } catch (err) {
        console.error('Erro ao buscar dados:', err);
      }
    }

    function renderizarLista() {
      const wrapper = document.getElementById('lista-wrapper');
      const vaziMsg = document.getElementById('lista-vazio');

      // Parar animação anterior
      wrapper.classList.remove('scrolling');
      wrapper.style.animationDuration = '';
      wrapper.innerHTML = '';

      if (!carnes.length) {
        vaziMsg.style.display = 'flex';
        wrapper.appendChild(vaziMsg);
        return;
      }

      vaziMsg.style.display = 'none';

      function criarItem(c) {
        const preco = (c.destaque && c.preco_desconto) ? c.preco_desconto : c.preco_kg;
        const div = document.createElement('div');
        div.className = 'carne-item';
        div.innerHTML = `
          ${getIcone(c.tipo)}
          <span class="carne-nome">${c.nome.toUpperCase()}</span>
          <div class="carne-preco-area">
            <span class="carne-rs">R$</span>
            <span class="carne-valor">${formatPreco(preco)}</span>
            <span class="carne-kg">&nbsp;KG</span>
          </div>
        `;
        return div;
      }

      // Renderizar itens
      const frag = document.createDocumentFragment();
      carnes.forEach(c => frag.appendChild(criarItem(c)));
      wrapper.appendChild(frag);

      // Verificar se precisa de scroll
      requestAnimationFrame(() => {
        const listaEl = document.querySelector('.lista-carnes');
        const wrapperH = wrapper.scrollHeight;
        const containerH = listaEl.clientHeight;

        if (wrapperH > containerH) {
          // Duplicar para loop seamless
          const frag2 = document.createDocumentFragment();
          carnes.forEach(c => frag2.appendChild(criarItem(c)));
          wrapper.appendChild(frag2);

          // ~3.5s por item para leitura confortável
          const duracao = Math.max(carnes.length * 3.5, 20);
          wrapper.style.animationDuration = `${duracao}s`;
          wrapper.classList.add('scrolling');
        }
      });
    }

    function renderizarDestaque() {
      destaques = carnes.filter(c => c.destaque);
      destaqueIdx = 0;

      if (destaqueTimer) { clearInterval(destaqueTimer); destaqueTimer = null; }

      const area = document.getElementById('destaque-area');

      if (!destaques.length) {
        area.style.display = 'none';
        return;
      }

      area.style.display = 'block';
      mostrarDestaque(0);

      if (destaques.length > 1) {
        destaqueTimer = setInterval(() => {
          destaqueIdx = (destaqueIdx + 1) % destaques.length;
          mostrarDestaque(destaqueIdx);
        }, 3000);
      }
    }

    function mostrarDestaque(idx) {
      const carne = destaques[idx];
      const foto = document.getElementById('destaque-foto');
      const info = document.getElementById('destaque-info');

      // Fade out
      foto.style.opacity = '0';
      info.style.opacity = '0';

      setTimeout(() => {
        foto.src = carne.imagem_url;
        document.getElementById('destaque-nome').textContent = carne.nome.toUpperCase();
        document.getElementById('destaque-sub').textContent = carne.tipo ? carne.tipo.toUpperCase() : 'SEM OSSO KG';
        document.getElementById('destaque-valor').textContent = formatPreco(carne.preco_desconto || carne.preco_kg);

        const descBadge = document.getElementById('destaque-desconto-badge');
        if (carne.percentual_desconto) {
          document.getElementById('destaque-desconto-texto').textContent = `${carne.percentual_desconto}% OFF`;
          descBadge.style.display = 'block';
        } else {
          descBadge.style.display = 'none';
        }

        foto.onload = () => { foto.style.opacity = '1'; info.style.opacity = '1'; };
        if (foto.complete && foto.src) { foto.style.opacity = '1'; info.style.opacity = '1'; }
      }, 450);
    }

    function renderizar() {
      renderizarLista();
      renderizarDestaque();
    }

    // Init
    verificarAuth();
    fetchCarnes();
    setInterval(fetchCarnes, 30000);
  </script>
</body>
</html>
